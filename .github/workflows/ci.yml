name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same branch/PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      # Turbo daemon is not useful in CI and can cause hangs — disable it.
      TURBO_DAEMON: false
      # Prevent Turbo from prompting for telemetry consent in non-interactive mode.
      TURBO_TELEMETRY_DISABLED: 1

    steps:
      - uses: actions/checkout@v4

      # Install pnpm first — actions/setup-node reads the version from the
      # packageManager field ("pnpm@x.y.z") in package.json when no version is given.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      # Cache Turbo's local output cache (.turbo/) between CI runs so that
      # unchanged packages are not rebuilt on every push.
      - name: Cache Turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint has no upstream dependencies — runs across all packages in parallel.
      - name: Lint
        run: pnpm lint

      # Typecheck depends on ^build (Turbo builds shared + db packages first).
      - name: Typecheck
        run: pnpm typecheck

      # Build the full production graph (shared → db → server + web).
      # Runs after typecheck so a broken build fails fast before tests.
      - name: Build
        run: pnpm build

      # Tests run last; Turbo reuses the builds already cached from the steps above.
      - name: Test
        run: pnpm test
