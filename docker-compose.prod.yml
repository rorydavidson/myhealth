# Production Docker Compose
# Usage:
#   Option A — pre-built images from Docker Hub (recommended):
#     1. Copy .env.example to .env and fill in all values, including DOCKERHUB_USERNAME
#     2. docker compose -f docker-compose.prod.yml up -d
#
#   Option B — build images locally on the server:
#     1. Copy .env.example to .env and fill in all values
#     2. docker compose -f docker-compose.prod.yml up -d --build
#
# The web app is a static SPA served by nginx — it connects directly to the
# server API. Health data never leaves the user's browser.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-health}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-health}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-health}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    # Pull the pre-built image from Docker Hub by default.
    # Use --build to build locally from source instead.
    image: rorydavidson/health-server:latest
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-health}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-health}
      PORT: 3001
      HOST: 0.0.0.0
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required (e.g. https://yourdomain.com)}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      # Email address that can access /admin via magic-link auth. Omit to disable.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-3001}:3001"

  web:
    # Pull the pre-built image from Docker Hub by default.
    # Use --build to build locally from source instead.
    image: rorydavidson/health-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_FHIR_TERMINOLOGY_URL: ${VITE_FHIR_TERMINOLOGY_URL:-https://browser.ihtsdotools.org/fhir}
        VITE_API_URL: ${CORS_ORIGIN}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - server

volumes:
  pgdata:
