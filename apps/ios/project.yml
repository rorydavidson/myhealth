name: HealthDashboard

options:
  bundleIdPrefix: com.healthdashboard
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  generateEmptyDirectories: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_TESTABILITY: YES

configs:
  Debug: debug
  Release: release

targets:
  HealthDashboard:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthDashboard
    info:
      path: HealthDashboard/Resources/Info.plist
      properties:
        NSHealthShareUsageDescription: "Health Dashboard reads your health and fitness data to display trends and personalised insights."
        NSHealthUpdateUsageDescription: "Health Dashboard does not write to your Health data."
        CFBundleDisplayName: Health Dashboard
        FhirTerminologyURL: "https://browser.ihtsdotools.org/fhir"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: ""
        BGTaskSchedulerPermittedIdentifiers:
          - com.healthdashboard.weekly-summary
        CFBundleSupportedPlatforms:
          - iPhoneOS
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: HealthDashboard/HealthDashboard.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthdashboard.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
      Debug:
        DEBUG_INFORMATION_FORMAT: dwarf
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      Release:
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        SWIFT_OPTIMIZATION_LEVEL: "-Osize"
    dependencies: []

  HealthDashboardTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthDashboardTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.healthdashboard.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HealthDashboard.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HealthDashboard"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: HealthDashboard
